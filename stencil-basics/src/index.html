<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>
    <script type="module" src="/build/stencil-basics.esm.js"></script>
    <script nomodule src="/build/stencil-basics.js"></script>
  </head>
  <body>

    <my-side-drawer
      heading="The side drawer title"
    ></my-side-drawer>

    <script>
      const sideDrawer = document.querySelector('my-side-drawer');
      setTimeout(
        () => sideDrawer.heading = 'Changed side drawer title',
        3000
      );
    </script>

  </body>
</html>
