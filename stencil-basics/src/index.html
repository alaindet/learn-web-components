<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>
    <script type="module" src="/build/stencil-basics.esm.js"></script>
    <script nomodule src="/build/stencil-basics.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
      .side-drawer-nav ul {
        list-style: none;
      }
    </style>
  </head>
  <body>

    <button id="side-drawer-trigger">Open drawer</button>

    <my-side-drawer heading="The side drawer title">
      <nav class="side-drawer-nav">
        <ul>
          <li><a href="/">Foo</a></li>
          <li><a href="/">Bar</a></li>
          <li><a href="/">Baz</a></li>
        </ul>
      </nav>
    </my-side-drawer>

    <script>
      const sideDrawer = document.querySelector('my-side-drawer');
      const sideDrawerTrigger = document.querySelector('#side-drawer-trigger');
      sideDrawerTrigger.addEventListener('click', () => {
        if (!sideDrawer.open) {
          sideDrawer.open = true;
        }
      });
    </script>

  </body>
</html>
