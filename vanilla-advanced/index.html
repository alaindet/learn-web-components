<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS - Web Components - Advanced</title>
  <style>
    html {
      box-sizing: border-box;
      font-size: 18px;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    * {
      box-sizing: inherit;
    }
    body {
      margin: 2rem;
    }
  </style>
</head>
<body>

  <my-modal>
    <h1 slot="title">My custom title</h1>
    <span>This is the modal content from the light DOM</span>
  </my-modal>

  <p>Please confirm your choice</p>
  <button id="confirm">Confirm?</button>

  <script src="./modal.js"></script>
  <script>
    const confirmButton = document.querySelector('#confirm');
    const myModal = document.querySelector('my-modal');

    myModal.addEventListener('my-modal-confirm', () => {
      console.log('Confirmed');
    });

    myModal.addEventListener('my-modal-cancel', () => {
      console.log('Canceled');
    });

    confirmButton.addEventListener('click', () => {
      if (!myModal.isOpen) {
        myModal.open();
      }
    });
  </script>
</body>
</html>
