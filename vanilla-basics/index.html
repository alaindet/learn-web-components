<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS - Web Components</title>
</head>
<body>

  <section>
    <my-tooltip text="I am a tooltip">
      <span class="highlight">Web Components</span>
    </my-tooltip>
    are awesome!
  </section>

  <section>
    <my-tooltip text="I am a tooltip" color="green">
      <span class="highlight">Web Components</span>
    </my-tooltip>
    are awesome!
  </section>

  <section weight-bold>
    <my-tooltip text="I am a tooltip">
      <span class="highlight">Web Components</span>
    </my-tooltip>
    are awesome!
  </section>

  <section>
    <a href="https://www.google.com">Google</a>
    <a href="https://www.google.com" is="my-confirm-link">Google (confirm)</a>
  </section>

  <script src="./tooltip.js"></script>
  <script src="./confirm-link.js"></script>
</body>
</html>
