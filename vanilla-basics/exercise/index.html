<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS - Web Components - Exercise</title>
  <script src="./visibility-toggle.js"></script>
</head>

<body>

  <section>
    <my-visibility-toggle>
      This is initially visible
    </my-visibility-toggle>

    <my-visibility-toggle visible="true">

      This is initially hidden
    </my-visibility-toggle>
  </section>

</body>
